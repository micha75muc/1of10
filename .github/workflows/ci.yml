name: CI

# Auto-Trigger deaktiviert: Pusher-Account ist Microsoft EMU
# (mhahnel_microsoft) → Enterprise-Policy blockiert Actions in
# externen Repos wie gim-home/1of10 → jeder Push erzeugte
# "startup_failure" + Notification-Mail.
#
# Deployment läuft sowieso via:
#   - scripts/deploy-vercel.py (Web)
#   - rsync + docker compose (Agents auf Hetzner)
#
# Tests laufen lokal: cd apps/web && npx vitest run
#
# Workflow ist via "Actions"-Tab → "Run workflow" weiterhin
# manuell auslösbar — falls wir das Repo später unter einem
# Nicht-EMU-Account migrieren, einfach push/pull_request wieder
# einkommentieren.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm turbo typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      STRIPE_MOCK: "true"
      EMAIL_MOCK: "true"
      DATABASE_URL: "mock"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm turbo build

  python-check:
    name: Python Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/agents/requirements.txt
      - run: pip install -r apps/agents/requirements.txt
      - run: python -m py_compile apps/agents/main.py
      - run: find apps/agents -name "*.py" -exec python -m py_compile {} +
