# Sven (Security) S10 — automatisches Patchen von Dependency-CVEs.
# Dependabot öffnet wöchentlich PRs für npm + GitHub Actions Updates.
# Major-Bumps werden gruppiert pro Ecosystem, Patch/Minor einzeln.
version: 2
updates:
  # apps/web (Next.js, Stripe, Prisma, …)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "auto"
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # packages/db (Prisma, Postgres-Treiber)
  - package-ecosystem: "npm"
    directory: "/packages/db"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "auto"
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Root workspace (turbo, eslint, typescript)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "auto"
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
