<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="front-TREND-IS-5PC-2Y" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D71920"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <linearGradient id="side-TREND-IS-5PC-2Y" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B0000"/>
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="top-TREND-IS-5PC-2Y" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#D71920"/>
      <stop offset="100%" style="stop-color:#D71920;stop-opacity:0.7"/>
    </linearGradient>
    <filter id="shadow-TREND-IS-5PC-2Y">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f7" rx="12"/>
  
  <!-- 3D Box -->
  <g filter="url(#shadow-TREND-IS-5PC-2Y)" transform="translate(95, 25)">
    <!-- Side face (right) -->
    <polygon points="180,20 210,8 210,228 180,240" fill="url(#side-TREND-IS-5PC-2Y)"/>
    
    <!-- Top face -->
    <polygon points="10,20 180,20 210,8 40,8" fill="url(#top-TREND-IS-5PC-2Y)" opacity="0.8"/>
    
    <!-- Front face -->
    <rect x="10" y="20" width="170" height="220" rx="3" fill="url(#front-TREND-IS-5PC-2Y)"/>
    
    <!-- Decorative line on front -->
    <rect x="10" y="20" width="170" height="4" fill="#FF5252" opacity="0.6" rx="1"/>
    
    <!-- Shield/icon circle -->
    <circle cx="95" cy="95" r="28" fill="white" opacity="0.15"/>
    <circle cx="95" cy="95" r="20" fill="white" opacity="0.1"/>
    
    <!-- Brand name -->
    <text x="95" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" letter-spacing="2" fill="#fff" opacity="0.7">TREND MICRO</text>
    
    <!-- Edition name -->
    <text x="95" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#fff">Internet Security</text>
    
    <!-- Sub info (devices/duration) -->
    <rect x="35" y="195" width="120" height="24" rx="12" fill="white" opacity="0.2"/>
    <text x="95" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fff">5 PC · 2 Jahre</text>
  </g>
</svg>