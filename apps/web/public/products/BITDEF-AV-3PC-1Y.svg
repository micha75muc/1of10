<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="front-BITDEF-AV-3PC-1Y" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ED1C24"/>
      <stop offset="100%" style="stop-color:#8B0015"/>
    </linearGradient>
    <linearGradient id="side-BITDEF-AV-3PC-1Y" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B0015"/>
      <stop offset="100%" style="stop-color:#8B0015;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="top-BITDEF-AV-3PC-1Y" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ED1C24"/>
      <stop offset="100%" style="stop-color:#ED1C24;stop-opacity:0.7"/>
    </linearGradient>
    <filter id="shadow-BITDEF-AV-3PC-1Y">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f7" rx="12"/>
  
  <!-- 3D Box -->
  <g filter="url(#shadow-BITDEF-AV-3PC-1Y)" transform="translate(95, 25)">
    <!-- Side face (right) -->
    <polygon points="180,20 210,8 210,228 180,240" fill="url(#side-BITDEF-AV-3PC-1Y)"/>
    
    <!-- Top face -->
    <polygon points="10,20 180,20 210,8 40,8" fill="url(#top-BITDEF-AV-3PC-1Y)" opacity="0.8"/>
    
    <!-- Front face -->
    <rect x="10" y="20" width="170" height="220" rx="3" fill="url(#front-BITDEF-AV-3PC-1Y)"/>
    
    <!-- Decorative line on front -->
    <rect x="10" y="20" width="170" height="4" fill="#FF6B6B" opacity="0.6" rx="1"/>
    
    <!-- Shield/icon circle -->
    <circle cx="95" cy="95" r="28" fill="white" opacity="0.15"/>
    <circle cx="95" cy="95" r="20" fill="white" opacity="0.1"/>
    
    <!-- Brand name -->
    <text x="95" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" letter-spacing="2" fill="#fff" opacity="0.7">BITDEFENDER</text>
    
    <!-- Edition name (auto-wrapped for long names) -->
    <text x="95" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#fff">Antivirus Plus</text>
    
    
    <!-- Sub info (devices/duration) -->
    <rect x="44.75" y="195" width="100.5" height="24" rx="12" fill="white" opacity="0.2"/>
    <text x="95" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fff">3 PC · 1 Jahr</text>
  </g>
</svg>